name: Publish Docker Image

on:
  push:
    branches:
      - version/**
  workflow_dispatch:

env:
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@v2

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "graalvm"
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          allow-snapshot-wrappers: true

      - name: Build with Gradle
        run: ./gradlew shadowJar

      - name: Extract Project Version
        id: get_version
        run: |
          VERSION=$(./gradlew properties --no-daemon \
            | grep '^version:' \
            | awk '{print $2}')

          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            SNAPSHOT_FLAG=true
          else
            SNAPSHOT_FLAG=false
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SNAPSHOT_FLAG=$SNAPSHOT_FLAG" >> $GITHUB_ENV

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: repo.slne.dev/slne-docker-public
          username: ${{ secrets.SLNE_DOCKER_REPO_USERNAME }}
          password: ${{ secrets.SLNE_DOCKER_REPO_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tags
        run: |
          CURRENT_BRANCH=${GITHUB_REF#refs/heads/}
          if [ "${SNAPSHOT_FLAG}" = "true" ] || [ "${CURRENT_BRANCH}" != "${DEFAULT_BRANCH}" ]; then
            echo "MAKE_LATEST=false" >> $GITHUB_ENV
          else
            echo "MAKE_LATEST=true" >> $GITHUB_ENV
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: repo.slne.dev/slne-docker-public/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest,enable=${{ env.MAKE_LATEST == 'true' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
